<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!--
    Content Security Policy — defensa en profundidad contra XSS y data-injection.
    'unsafe-inline' en style-src es necesario para Leaflet y para los estilos
    dinámicos de los marcadores (color por institución). 'unsafe-inline' en
    script-src es necesario para los inline styles de React/Leaflet en runtime.
    img-src: data: para iconos SVG inline de Leaflet; blob: para CSV export.
  -->
  <meta http-equiv="Content-Security-Policy"
    content="
      default-src 'self';
      script-src 'self' 'unsafe-inline';
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      img-src 'self' data: blob: https://*.tile.openstreetmap.org https://server.arcgisonline.com;
      font-src 'self' https://fonts.gstatic.com;
      connect-src 'self';
      frame-ancestors 'none';
      base-uri 'self';
      form-action 'self';
    " />

  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <meta name="color-scheme" content="light" />
  <meta name="theme-color" content="#0f172a" />

  <title>Kennedy: Caracterización Social | Cartografía Distrital Bogotá</title>

  <meta name="description"
    content="Cartografía social distrital de la Localidad de Kennedy, Bogotá. Análisis interactivo de vulnerabilidad, pobreza multidimensional y presencia institucional. Fuentes oficiales: DANE 2023, Sisbén IV 2025, SDP." />
  <meta name="robots" content="index, follow" />
  <meta name="author" content="Sarai Yireth Corredor Miranda" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="es_CO" />
  <meta property="og:title" content="Kennedy: Caracterización Social" />
  <meta property="og:description"
    content="Análisis interactivo de vulnerabilidad social y presencia institucional en la Localidad de Kennedy, Bogotá." />

  <link rel="icon" type="image/svg+xml" href="/vite.svg" />

  <!-- Preconnect: negocia TLS de fuentes en paralelo al parseo del HTML -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- display=swap evita FOIT; subset acotado a los pesos realmente usados -->
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://unpkg.com" crossorigin />
  <link rel="dns-prefetch" href="https://unpkg.com" />
  <link rel="dns-prefetch" href="https://tile.openstreetmap.org" />
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0a0f1a" media="(prefers-color-scheme: dark)" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="format-detection" content="telephone=no" />
  <meta http-equiv="X-DNS-Prefetch-Control" content="on" />

</head>

<body>
  <div id="app"></div>
  <noscript>
    <p style="padding:2rem;text-align:center;font-family:system-ui,sans-serif;">
      Esta aplicación requiere JavaScript habilitado para mostrar la cartografía interactiva.
    </p>
  </noscript>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</body>

</html>
